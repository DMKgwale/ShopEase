<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShopEase</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
}

/* Header */
header {
  background: linear-gradient(90deg, #4a90e2, #007bff);
  color: white;
  padding: 15px;
  text-align: center;
}

h2 {
  margin-bottom: 10px;
}

/* Sections */
section {
  padding: 20px;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}

/* Cards */
.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  width: 220px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* Buttons */
button {
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  margin-top: 8px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

/* Cart */
.cart-item {
  background: white;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
}

/* Admin */
.admin {
  background: #eef7ff;
  padding: 20px;
  border-top: 3px solid #007bff;
}

input {
  padding: 6px;
  margin: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h1>🛍️ ShopEase</h1>
<p>Your simple online shopping experience</p>
</header>

<section>
<h2>🛒 Products</h2>
<div id="product-list" class="grid"></div>
</section>

<section>
<h2>🧺 Shopping Cart</h2>
<div id="cart"></div>
<button onclick="placeOrder()">✅ Place Order</button>
</section>

<section>
<h2>📦 Order Tracking</h2>
<div id="orders"></div>
</section>

<section class="admin">
<h2>⚙️ Admin Panel</h2>

<h4>Add Product</h4>
<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="stock" type="number" placeholder="Stock">
<button onclick="addProduct()">Add Product</button>

<h4>Promotion (%)</h4>
<input id="promo" type="number" placeholder="Discount">
<button onclick="applyPromo()">Apply Discount</button>

</section>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
  {id:1, name:"Laptop", price:800, stock:5},
  {id:2, name:"Phone", price:400, stock:10},
  {id:3, name:"Headphones", price:120, stock:8}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let promo = localStorage.getItem("promo") || 0;

function saveData() {
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("orders", JSON.stringify(orders));
}

// Render products
function renderProducts() {
  let html = "";
  products.forEach(p => {
    let discounted = (p.price - (p.price * promo / 100)).toFixed(2);

    html += `
    <div class="card">
      <h3>${p.name}</h3>
      <p><b>$${discounted}</b></p>
      <p>Stock: ${p.stock}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    </div>`;
  });
  document.getElementById("product-list").innerHTML = html;
}

// Add to cart
function addToCart(id) {
  let product = products.find(p => p.id === id);
  if (product.stock > 0) {
    cart.push(product);
    product.stock--;
    saveData();
    renderAll();
  } else {
    alert("Out of stock!");
  }
}

// Render cart
function renderCart() {
  let html = "";
  cart.forEach((item, i) => {
    html += `
    <div class="cart-item">
      ${item.name} - $${item.price}
      <button onclick="removeFromCart(${i})">Remove</button>
    </div>`;
  });
  document.getElementById("cart").innerHTML = html;
}

// Remove item
function removeFromCart(index) {
  let item = cart[index];
  let product = products.find(p => p.id === item.id);
  product.stock++;
  cart.splice(index, 1);
  saveData();
  renderAll();
}

// Place order
function placeOrder() {
  if (cart.length === 0) return alert("Cart is empty!");

  let order = {
    id: Date.now(),
    items: [...cart],
    status: "Processing"
  };

  orders.push(order);
  cart = [];
  saveData();
  renderAll();

  setTimeout(() => {
    order.status = "Shipped";
    saveData();
    renderOrders();
  }, 3000);

  setTimeout(() => {
    order.status = "Delivered";
    saveData();
    renderOrders();
  }, 6000);
}

// Render orders
function renderOrders() {
  let html = "";
  orders.forEach(o => {
    html += `
    <div class="cart-item">
      Order #${o.id}<br>
      Status: <b>${o.status}</b>
    </div>`;
  });
  document.getElementById("orders").innerHTML = html;
}

// Admin: add product
function addProduct() {
  let name = document.getElementById("name").value;
  let price = parseFloat(document.getElementById("price").value);
  let stock = parseInt(document.getElementById("stock").value);

  if (!name || !price || !stock) return alert("Fill all fields!");

  products.push({ id: Date.now(), name, price, stock });
  saveData();
  renderAll();
}

// Apply discount
function applyPromo() {
  promo = document.getElementById("promo").value;
  localStorage.setItem("promo", promo);
  renderProducts();
}

// Render all
function renderAll() {
  renderProducts();
  renderCart();
  renderOrders();
}

renderAll();
</script>

</body>
</html>
