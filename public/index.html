<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ShopEase - Demo</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">ShopEase</h1>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-inner container">
        <h3 class="logo">ShopEase</h3>
        <nav class="nav">
          <a href="#/" data-route="/" class="nav-link">Home</a>
          <a href="#/products" data-route="/products" class="nav-link">Products</a>
          <a href="#/cart" data-route="/cart" class="nav-link">Cart (<span id="cartCount">0</span>)</a>
          <a href="#/checkout" data-route="/checkout" class="nav-link">Checkout</a>
        </nav>
      </div>
    </aside>

    <main class="main">
      <div class="container">
        <header class="page-header">
          <div class="search">
            <input id="searchInput" placeholder="Search products..." aria-label="Search products">
          </div>
        </header>

        <section id="homePage" class="page">
          <div class="hero"><h2>Welcome to ShopEase</h2><p>anything you can think of at one place so you can shop at ease.</p></div>
        </section>

        <section id="productsPage" class="page" style="display:none">
          <div class="controls">
            <label>Sort:
              <select id="sortSelect">
                <option value="default">Recommended</option>
                <option value="price_asc">Price: Low to High</option>
                <option value="price_desc">Price: High to Low</option>
              </select>
            </label>
          </div>
          <section id="productGrid" class="product-grid" aria-live="polite"></section>
        </section>

        <section id="productDetailPage" class="page" style="display:none">
          <div class="product-detail">
            <button id="detailBack" class="btn">← Back</button>
            <div id="detailContent">
              <!-- populated by JS -->
            </div>
          </div>
        </section>

        <section id="cartPage" class="page" style="display:none">
          <h2>Your Cart</h2>
          <div id="cartItems"></div>
          <div class="cart-actions">
            <button id="checkoutBtn" class="btn primary">Checkout</button>
            <button id="clearCartBtn" class="btn">Clear</button>
          </div>
        </section>

        <section id="checkoutPage" class="page" style="display:none">
          <h2>Checkout</h2>
          <form id="checkoutForm" class="checkout-form">
            <label>Name <input name="name" required></label>
            <label>Email <input name="email" type="email" required></label>
            <label>Address <textarea name="address" required></textarea></label>
            <div class="form-actions"><button type="submit" class="btn primary">Place Order</button></div>
          </form>
        </section>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <div class="container">© ShopEase Demo</div>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
